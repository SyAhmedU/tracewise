<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style id="sx-infuse">
      :root{--font-display:'Fraunces',Georgia,'Times New Roman',serif;--font-mono:'IBM Plex Mono',ui-monospace,monospace;}
      html h1,html h2,html h3{font-family:var(--font-display);font-weight:600;letter-spacing:-.02em;}
      html,body{overflow-x:clip;}
      *{-webkit-tap-highlight-color:transparent;}
      .syed-bar{padding-top:env(safe-area-inset-top,0px);}
      @media (hover:none){button:hover{transform:none;}}
    </style>
    <meta name="description" content="Tracewise — document what your work actually is, step by step, so AI can be aimed where it genuinely helps." />
    <title>Tracewise — Map the work you actually do</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style id="sx-aurora-css">html{background:var(--bg,#FBF7EF);}body,#root{background:transparent !important;}canvas.sx-aurora{position:fixed!important;inset:0!important;width:100%!important;height:100%!important;z-index:-1!important;pointer-events:none;}@media (prefers-reduced-motion:reduce){canvas.sx-aurora{display:none;}}</style>
    <script src="https://syahmedu.github.io/research-suite/identity/syed-aurora.js" defer></script>
    <script>document.addEventListener('DOMContentLoaded',function(){try{if(window.SyedAurora&&SyedAurora.mount({zIndex:-1,intensity:0.85}))document.body.classList.add('aurora-on');}catch(e){}});</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
